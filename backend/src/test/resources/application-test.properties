# ── 동시성 통합 테스트 전용 설정 ─────────────────────────────
# 운영/개발 DB(nailed_db)를 건드리지 않도록 전용 스키마(nailed_ct)를 사용한다.
# createDatabaseIfNotExist=true 로 스키마가 없으면 자동 생성하고,
# ddl-auto=create-drop 으로 엔티티 기준 테이블을 만들고 테스트 종료 시 제거한다.
spring.application.name=nailed_BE

spring.datasource.url=jdbc:mysql://localhost:3306/nailed_ct?createDatabaseIfNotExist=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:mysql}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# 빈 스키마 첫 부팅 시 create-drop 이 "존재하지 않는 테이블 DROP"을 시도하며 남기는
# 무해한 경고(스택 트레이스) 억제 — 테스트 결과와 무관한 노이즈만 제거한다.
logging.level.org.hibernate.tool.schema.internal.ExceptionHandlerLoggedImpl=OFF

# Actuator 엔드포인트 노출 (ActuatorEndpointsTest 에서 health/metrics 검증)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=nailed

jwt.secret=${JWT_SECRET:nailed-local-development-secret-key-minimum-32-bytes}
jwt.access-token-validity-ms=${JWT_ACCESS_TTL:3600000}
jwt.refresh-token-validity-ms=${JWT_REFRESH_TTL:604800000}

file.upload.path=${UPLOAD_DIR:./data/uploads}
file.static.product.path=${PRODUCT_IMAGE_DIR:./data/images/products}
app.profile-image.upload-dir=${PROFILE_IMAGE_DIR:./data/images/profileImg}
app.profile-image.base-url=/images/profileImg
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
