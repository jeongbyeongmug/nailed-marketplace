# 다중 인스턴스 예시 구성: Nginx(LB) → 백엔드 2대 → MySQL 1대
#
# 핵심 포인트: 동시성 제어를 DB 비관적 락(SELECT ... FOR UPDATE)으로 했기 때문에
# 백엔드를 여러 대로 늘려도 동일 상품 주문은 같은 DB 행 락으로 직렬화되어 안전하다.
# (JVM 내부 락/synchronized 였다면 인스턴스가 늘어나는 순간 깨진다.)
#
# 실행:  docker compose -f deploy/docker-compose.yml up -d --build
services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-mysql}
      MYSQL_DATABASE: nailed_db
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend1:
    build: ../backend
    environment: &backend-env
      SPRING_PROFILES_ACTIVE: example
      DB_URL: jdbc:mysql://mysql:3306/nailed_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&useSSL=false
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-mysql}
      # 데모 편의를 위해 스키마 자동 생성(운영에선 마이그레이션 도구 권장)
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      mysql:
        condition: service_healthy

  backend2:
    build: ../backend
    environment: *backend-env
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend1
      - backend2

volumes:
  mysql-data:
